server:
  port: 8083

spring:
  application:
    name: location-service
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: locations
  flyway:
    enabled: true
    schemas:
      - locations
    locations:
      - classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${USER_SERVICE_JWKS_URL:http://localhost:8081/.well-known/jwks.json}
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  cloud:
    aws:
      region:
        static: ${AWS_REGION:us-east-1}
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID:test}
        secret-key: ${AWS_SECRET_ACCESS_KEY:test}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.accountabilityatlas: DEBUG

app:
  mapbox:
    access-token: ${MAPBOX_ACCESS_TOKEN:}
  sqs:
    video-status-events-queue: video-status-events
