server:
  port: 8083

spring:
  application:
    name: location-service
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: locations
  flyway:
    enabled: true
    schemas:
      - locations
    locations:
      - classpath:db/migration
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.accountabilityatlas: DEBUG

app:
  mapbox:
    access-token: ${MAPBOX_ACCESS_TOKEN:}
